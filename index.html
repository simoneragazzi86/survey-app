<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Survey Report</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Survey">
<meta name="theme-color" content="#1a3a5c">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3a5c;--navy2:#2d5a8e;--gold:#c8a84b;--bg:#f0f4f8;
  --card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#d1d5db;
  --green:#059669;--red:#dc2626;--r:10px;--sh:0 2px 8px rgba(0,0,0,.08)
}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:76px}
input,textarea,select{font-size:16px!important;font-family:inherit}
button{font-family:inherit;cursor:pointer}

/* HEADER */
.hdr{background:var(--navy);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-row1{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr h1{font-size:1rem;font-weight:700;letter-spacing:.02em}
.vessel-name{font-size:.78rem;color:var(--gold);margin-top:2px;min-height:1em}

/* NAV TABS */
.nav{background:var(--navy);padding:0 10px 8px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;gap:5px}
.nav::-webkit-scrollbar{display:none}
.nav-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:.75rem;font-weight:500;color:rgba(255,255,255,.65);border:1px solid transparent;background:transparent;white-space:nowrap;transition:all .2s}
.nav-btn.active{background:var(--gold);color:var(--navy);font-weight:700}
.nav-btn.disabled-sec{opacity:.45}
.nav-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}

/* MAIN */
.main{padding:12px;max-width:860px;margin:0 auto}

/* CARD */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.card-hdr{background:var(--navy);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-hdr h2{font-size:.9rem;font-weight:700;letter-spacing:.03em;line-height:1.2}
.card-hdr .en{font-size:.72rem;color:rgba(255,255,255,.65);font-weight:400}
.card-body{padding:10px 14px}

/* TOGGLE */
.tog{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:20px;font-size:.73rem;font-weight:600;flex-shrink:0}
.tog.off{background:var(--red);border-color:var(--red)}

/* FIELD ROWS */
.frow{display:grid;grid-template-columns:45% 1fr;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);align-items:center}
.frow:last-child{border-bottom:none}
.flabel{font-size:.78rem;color:var(--muted);font-weight:500;line-height:1.3;padding-right:4px}
.fval{display:flex;gap:5px;align-items:center}
.fi{flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 9px;font-size:.88rem;background:#fff;color:var(--text);-webkit-appearance:none;width:100%}
.fi:focus{outline:none;border-color:var(--navy2);box-shadow:0 0 0 3px rgba(45,90,142,.15)}
.sn-btn{flex-shrink:0;background:var(--navy);color:#fff;border:none;border-radius:5px;padding:7px 7px;font-size:.68rem;font-weight:700;line-height:1}
.del-row{background:#fee2e2;color:var(--red);border:none;border-radius:5px;padding:7px 7px;font-size:1rem;line-height:1;flex-shrink:0}

/* ROW ACTIONS */
.row-actions{display:flex;gap:8px;padding:8px 0 2px;justify-content:flex-start}
.btn-add{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:.8rem;font-weight:600}
.btn-add-custom{background:#e0e7ff;color:#3730a3;border:none;border-radius:7px;padding:7px 13px;font-size:.8rem;font-weight:600}

/* TESTS TABLE */
.sec-title{font-size:.78rem;font-weight:700;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.05em}
.tests-tbl{width:100%;border-collapse:collapse;margin-bottom:4px}
.tests-tbl th{background:#f1f5f9;font-size:.75rem;font-weight:600;padding:5px 7px;text-align:left;border:1px solid var(--border)}
.tests-tbl td{padding:3px 4px;border:1px solid var(--border)}
.tests-tbl .tfi{width:100%;border:none;padding:6px 5px;font-size:.85rem;background:transparent}
.del-test{background:#fee2e2;color:var(--red);border:none;border-radius:4px;padding:4px 6px;font-size:.8rem}
.btn-add-test{background:#e0e7ff;color:#3730a3;border:none;border-radius:7px;padding:5px 10px;font-size:.75rem;font-weight:600;margin-top:4px}

/* PHOTOS */
.photos-wrap{margin-top:12px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.photo-item{position:relative}
.photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(220,38,38,.85);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.photo-cap{width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:.73rem;margin-top:4px;color:var(--text)}
.photo-add{width:100%;aspect-ratio:4/3;border:2px dashed var(--border);border-radius:6px;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:.73rem;gap:4px}
.photo-add svg{opacity:.4;width:26px;height:26px}
.photo-input{display:none}

/* NOTES / OUTCOME */
.no-wrap{margin-top:12px;display:grid;gap:9px}
.no-wrap label{font-size:.78rem;font-weight:700;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.no-wrap textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:.88rem;resize:vertical;min-height:58px;color:var(--text);background:#fff}
.no-wrap textarea:focus{outline:none;border-color:var(--navy2)}
.outcome-ta{background:#fefce8!important;border-color:#d4af37!important;font-weight:600}

/* DOCUMENTS TABLE */
.docs-tbl{width:100%;border-collapse:collapse}
.docs-tbl th{background:#f1f5f9;font-size:.73rem;font-weight:700;padding:5px 6px;border:1px solid var(--border);text-align:left}
.docs-tbl td{padding:3px 4px;border:1px solid var(--border)}
.docs-tbl .dfi{width:100%;border:none;padding:5px 4px;font-size:.82rem;background:transparent}
.del-doc{background:#fee2e2;color:var(--red);border:none;border-radius:4px;padding:4px 6px;font-size:.8rem}
.btn-add-doc{background:#e0e7ff;color:#3730a3;border:none;border-radius:7px;padding:5px 10px;font-size:.75rem;font-weight:600;margin-top:4px}

/* COVER FORM */
.cover-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cover-field{display:flex;flex-direction:column;gap:4px}
.cover-field label{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cover-field input,.cover-field textarea{border:1px solid var(--border);border-radius:7px;padding:9px 10px;font-size:.9rem;background:#fff;color:var(--text);-webkit-appearance:none}
.cover-field input:focus,.cover-field textarea:focus{outline:none;border-color:var(--navy2)}
.cover-field.full{grid-column:1/-1}

/* SEA TRIAL TABLE */
.sea-grid{display:grid;gap:8px}
.sea-run-card{border:1px solid var(--border);border-radius:7px;overflow:hidden}
.sea-run-hdr{background:#f1f5f9;padding:6px 10px;font-size:.78rem;font-weight:700;color:var(--navy);display:flex;justify-content:space-between;align-items:center}
.sea-run-body{padding:6px}
.sea-tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.sea-tbl td{padding:4px 5px;border:1px solid var(--border)}
.sea-tbl td:first-child{font-weight:600;background:#f8fafc;width:55%}
.sea-tbl input{width:100%;border:none;padding:3px;font-size:.8rem;background:transparent;text-align:center}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;box-shadow:0 -2px 8px rgba(0,0,0,.08);z-index:200}
.btn-primary{flex:1;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:12px;font-size:.9rem;font-weight:700}
.btn-secondary{background:#fff;color:var(--navy);border:2px solid var(--navy);border-radius:9px;padding:12px 14px;font-size:.82rem;font-weight:700}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:9px;padding:12px 14px;font-size:.82rem;font-weight:700}

/* TOAST */
.toast{position:fixed;top:120px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;padding:9px 18px;border-radius:20px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}

/* SAVE STATUS */
.save-status{font-size:.72rem;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px;flex-shrink:0}
.save-dot{width:7px;height:7px;border-radius:50%;background:#4ade80}
.save-dot.saving{background:var(--gold);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* DISABLED SECTION OVERLAY */
.sec-disabled .card-body,.sec-disabled .frow,.sec-disabled .tests-tbl,.sec-disabled .photos-wrap,.sec-disabled .no-wrap{opacity:.35;pointer-events:none}

/* RESPONSIVE */
@media(max-width:520px){
  .cover-grid{grid-template-columns:1fr}
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .frow{grid-template-columns:1fr}
  .fval{flex-wrap:nowrap}
}
</style>
</head>

<div class="toast" id="toast"></div>

function defaultSeaRuns() {
  const PARAMS = [

    "Fuel consump. rate (lt/h)","Gearbox oil pressure (kPa)","Gearbox oil temp. (°C)",

  ];
  const runs = Array.from({length:9}, (_,i) => ({

function getSection(id) { return state.sections.find(s=>s.id===id); }
function getDef(id) { return SECTIONS.find(s=>s.id===id); }

// ─── INDEXEDDB ───────────────────────────────────────────────────────────────
let db = null;
async function openDB() {
  if (db) return db;
  return new Promise((res,rej) => {
    const req = indexedDB.open('SurveyApp', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('data');
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e.target.error);
  });
}
async function saveState() {
  setStatus('saving');
  try {
    const d = await openDB();
    await new Promise((res,rej) => {
      const tx = d.transaction('data','readwrite');
      tx.objectStore('data').put(JSON.stringify(state), 'current');
      tx.oncomplete = () => { setStatus('saved'); res(); };
      tx.onerror = rej;
    });
  } catch(e) { console.error(e); setStatus('saved'); }
}
async function loadState() {
  try {
    const d = await openDB();
    return new Promise((res,rej) => {
      const tx = d.transaction('data','readonly');
      const req = tx.objectStore('data').get('current');
      req.onsuccess = e => res(e.target.result ? JSON.parse(e.target.result) : null);
      req.onerror = rej;
    });
  } catch(e) { return null; }
}
async function clearState() {
  const d = await openDB();
  return new Promise((res,rej) => {
    const tx = d.transaction('data','readwrite');
    tx.objectStore('data').delete('current');
    tx.oncomplete = res; tx.onerror = rej;
  });
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 800);
}

function setStatus(s) {
  const dot = document.getElementById('save-dot');
  const lbl = document.getElementById('save-label');
  if (!dot) return;
  if (s==='saving') { dot.className='save-dot saving'; lbl.textContent='Salvataggio…'; }
  else { dot.className='save-dot'; lbl.textContent='Salvato'; }
}

function buildNav() {
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = SECTIONS.map(s => {
    const sec = getSection(s.id);
    const isActive = s.id === currentTab;
    const isDisabled = !sec.enabled;
    return `<button class="nav-btn${isActive?' active':''}${isDisabled?' disabled-sec':''}"
      onclick="switchTab('${s.id}')">${s.navLabel||s.title.split(' ')[0]}</button>`;
  }).join('');
  // scroll active tab into view
  setTimeout(() => {
    const active = nav.querySelector('.active');
    if (active) active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  }, 50);
}

function switchTab(id) {
  currentTab = id;
  buildNav();
  renderSection();
}

function renderSection() {
  const sec = getSection(currentTab);
  const def = getDef(currentTab);

  document.getElementById('hdr-vessel').textContent = state.vessel.name || '— nessun yacht —';

  if (def.type === 'cover') { el.innerHTML = renderCover(); attachCoverEvents(); return; }
  if (def.type === 'documents') { el.innerHTML = renderDocuments(sec, def); attachDocEvents(sec); return; }
  if (def.type === 'sea_trial') { el.innerHTML = renderSeaTrial(sec, def); attachSeaEvents(sec); return; }
  if (def.type === 'recommendations') { el.innerHTML = renderRecommendations(sec, def); attachRecEvents(sec); return; }
  if (def.type === 'conclusions') { el.innerHTML = renderConclusions(sec, def); attachConclEvents(sec); return; }

  el.innerHTML = renderStandardSection(sec, def);
  attachStandardEvents(sec, def);
}

    });

async function compressImage(file, maxW=1400, q=0.82) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxW / img.width, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL('image/jpeg', q));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── BACKUP / RESTORE ────────────────────────────────────────────────────────
function backupReport() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fname = (state.vessel.name || 'Survey').replace(/[^a-zA-Z0-9_\- ]/g,'_');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `${fname}_backup_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup esportato');
}

function restoreReport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const restored = JSON.parse(e.target.result);
      if (!restored.vessel || !restored.sections) throw new Error('File non valido');
      if (!confirm(`Ripristinare il backup "${restored.vessel.name || 'senza nome'}"? I dati attuali verranno sostituiti.`)) return;
      state = restored;
      // Migrate: add missing sections
      SECTIONS.forEach(def => {
        if (!state.sections.find(s=>s.id===def.id)) {
          state.sections.push({
            id:def.id, enabled:true,
            rows:def.rows.map(r=>({label:r,value:''})),
            tests:def.tests.map(t=>({name:t,outcome:''})),
            photos:[], notes:'', outcome:'',
            docs:def.defaultDocs?def.defaultDocs.map(d=>({doc:d,issuedBy:'',issueDate:'',expiry:''})):undefined,
            seaRuns:def.type==='sea_trial'?defaultSeaRuns():undefined,
            recommendText:'', conclusionText:''
          });
        }
      });
      await saveState();
      currentTab = 'cover';
      buildNav(); renderSection();
      showToast('Backup ripristinato');
    } catch(err) {
      showToast('Errore: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

async function newReport() {
  if (!confirm('Creare un nuovo report? I dati attuali verranno eliminati.')) return;
  await clearState();
  state = defaultState();
  currentTab = 'cover';
  buildNav();
  renderSection();
  showToast('Nuovo report creato');
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRaw(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── WORD HTML EXPORT ────────────────────────────────────────────────────────
function exportWord() {
  showToast('Generazione in corso…');
  setTimeout(() => {
    try {
      const html = buildWordHTML();
      const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const fname = (state.vessel.name || 'Survey').replace(/[^a-zA-Z0-9_\- ]/g,'_');
      a.href = url; a.download = `${fname}_report.doc`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('File scaricato! Aprire in Word e salvare come .docx');
    } catch(e) {
      console.error(e);
      showToast('Errore: ' + e.message);
    }
  }, 100);
}

function buildWordHTML() {
  const v = state.vessel;
  const sectionsHTML = state.sections
    .filter(sec => {
      const def = getDef(sec.id);
      return sec.enabled && def;
    })
    .map(sec => buildWordSection(sec))
    .join('\n');

  return `<html xmlns:o='urn:schemas-microsoft-com:office:office'
    xmlns:w='urn:schemas-microsoft-com:office:word'
    xmlns='http://www.w3.org/TR/REC-html40'>
<head>
<meta charset='utf-8'>
<title>Survey Report — ${escRaw(v.name)}</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
<style>
  @page { size:A4; margin:2cm 2cm 2.5cm 2cm }
  body { font-family:Arial,sans-serif; font-size:10pt; color:#1a3a5c }
  h1 { font-size:13pt; color:#1a3a5c; margin:0 0 4pt }
  table { border-collapse:collapse; width:100%; margin-bottom:10pt }
  td,th { border:none; padding:4pt 6pt; vertical-align:top; font-size:9pt; color:#1a3a5c }
  .sec-hdr td { background:#dce8f5; color:#1a3a5c; font-weight:bold; font-size:10pt; border:3pt double #1a3a5c; padding:8pt; text-align:center }
  .lbl { width:45%; font-size:9pt }
  .tests-hdr td { font-weight:bold; font-size:8pt; border:1pt solid #bbb; text-align:center }
  .tests-row td { border:1pt solid #ddd }
  .outcome-row td { font-weight:bold }
  .photo-cell { text-align:center; padding:6pt; width:50%; vertical-align:top }
  .photo-cell img { width:7.8cm; border:1pt solid #ccc; display:block; margin:0 auto }
  .photo-caption { border:1pt solid #bbb; padding:3pt 5pt; font-size:8pt; margin-top:4pt; min-height:18pt; width:100%; text-align:left }
  .run-hdr td { font-weight:bold; font-size:9pt; border:1pt solid #bbb; text-align:center }
  .run-col-hdr td { font-weight:bold; font-size:8pt; text-align:center; border:1pt solid #bbb }
  .run-data td { border:1pt solid #ddd }
  .cover-tbl td { border:1pt solid #bbb; padding:5pt 8pt }
  .cover-lbl { font-weight:bold; font-size:9pt; width:35% }
  p { margin:4pt 0 }
</style>
</head>
<body>
<!-- COVER -->
<h1>Survey Report</h1>
<table class="cover-tbl">
  <tr><td class="cover-lbl">Nome Yacht / Vessel Name</td><td>${escRaw(v.name)}</td><td class="cover-lbl">Building N°</td><td>${escRaw(v.buildingNr)}</td></tr>
  <tr><td class="cover-lbl">Luogo / Location</td><td>${escRaw(v.location)}</td><td class="cover-lbl">Data / Date</td><td>${escRaw(v.date)}</td></tr>
  <tr><td class="cover-lbl">Rappresentante armatore / Owner's rep</td><td>${escRaw(v.ownerRep)}</td><td class="cover-lbl">Rappresentante cantiere / Yard's rep</td><td>${escRaw(v.yardRep)}</td></tr>
</table>

${sectionsHTML}

<p style="margin-top:20pt;font-size:9pt;color:#666">La Spezia — Piero Ragazzi S.r.l.</p>
</body></html>`;
}

function buildWordSection(sec) {
  const def = getDef(sec.id);
  if (!def) return '';
  if (def.id === 'cover') return '';

  const hdr = `<tr class="sec-hdr"><td colspan="2"><strong>${escRaw(def.title)}</strong><br><span style="font-size:8pt;font-weight:normal">${escRaw(def.titleEn)}</span></td></tr>`;

  if (def.type === 'documents') return buildWordDocuments(sec, def, hdr);
  if (def.type === 'sea_trial') return buildWordSeaTrial(sec, def);
  if (def.type === 'recommendations') return buildWordRecommendations(sec, def);
  if (def.type === 'conclusions') return buildWordConclusions(sec, def);

  // Standard section
  const rows = sec.rows.map(r =>
    `<tr><td class="lbl">${escRaw(r.label)}</td><td>${escRaw(r.value)}</td></tr>`
  ).join('');

  const testsHTML = sec.tests.length ? `
    <tr class="tests-hdr"><td colspan="2">TESTS</td></tr>
    <tr class="tests-hdr"><td>Type of test</td><td>Outcome</td></tr>
    ${sec.tests.map(t=>`<tr class="tests-row"><td>${escRaw(t.name)}</td><td>${escRaw(t.outcome)}</td></tr>`).join('')}
  ` : '';

  const photosHTML = buildWordPhotos(sec);
  const notesRow = sec.notes ? `<tr><td class="lbl">Note</td><td>${escRaw(sec.notes).replace(/\n/g,'<br>')}</td></tr>` : '';
  const outcomeRow = `<tr class="outcome-row"><td class="lbl"><strong>Giudizio / Outcome</strong></td><td><strong>${escRaw(sec.outcome)}</strong></td></tr>`;

  return `<table>${hdr}${rows}${testsHTML}${notesRow}${outcomeRow}</table>${photosHTML}`;
}

function buildWordDocuments(sec, def, hdr) {
  const rows = (sec.docs||[]).map(d =>
    `<tr><td>${escRaw(d.doc)}</td><td>${escRaw(d.issuedBy)}</td><td>${escRaw(d.issueDate)}</td><td>${escRaw(d.expiry)}</td></tr>`
  ).join('');
  const notesRow = sec.notes ? `<tr><td class="lbl" colspan="4">Note: ${escRaw(sec.notes)}</td></tr>` : '';
  return `<table>
    <tr class="sec-hdr"><td colspan="4"><strong>${escRaw(def.title)}</strong><br><span style="font-size:8pt;font-weight:normal">${escRaw(def.titleEn)}</span></td></tr>
    <tr class="tests-hdr"><td>Documento</td><td>Rilasciato da / Issued by</td><td>Data rilascio</td><td>Scadenza / Expiry</td></tr>
    ${rows}${notesRow}
  </table>`;
}

function buildWordSeaTrial(sec, def) {
  const sr = sec.seaRuns;
  const runsHTML = sr.runs.map((run, ri) => {
    const colHdr = `<tr class="run-col-hdr"><td>Parametro</td><td>PORT</td><td>STBD</td></tr>`;
    const params = run.params.map(p =>
      `<tr class="run-data"><td class="lbl">${escRaw(p.name)}</td><td>${escRaw(p.portVal)}</td><td>${escRaw(p.stbdVal)}</td></tr>`
    ).join('');
    return `<tr class="run-hdr"><td colspan="3">Run ${ri+1} — ${escRaw(run.rpm)} rpm</td></tr>${colHdr}${params}`;
  }).join('');

  const photosHTML = buildWordPhotos(sec);

  return `<table>
    <tr class="sec-hdr"><td colspan="3"><strong>${escRaw(def.title)}</strong><br><span style="font-size:8pt;font-weight:normal">${escRaw(def.titleEn)}</span></td></tr>
    ${runsHTML}
    ${sr.topSpeed?`<tr class="run-data"><td class="lbl">Top Speed</td><td colspan="2">${escRaw(sr.topSpeed)}</td></tr>`:''}
    ${sr.manoeuvrNotes?`<tr class="run-data"><td class="lbl">Manoeuvrability</td><td colspan="2">${escRaw(sr.manoeuvrNotes)}</td></tr>`:''}
    ${sec.notes?`<tr class="run-data"><td class="lbl">Note</td><td colspan="2">${escRaw(sec.notes)}</td></tr>`:''}
  </table>${photosHTML}`;
}

function buildWordRecommendations(sec, def) {
  return `<table>
    <tr class="sec-hdr"><td><strong>${escRaw(def.title)}</strong><br><span style="font-size:8pt;font-weight:normal">${escRaw(def.titleEn)}</span></td></tr>
    <tr><td style="white-space:pre-wrap">${escRaw(sec.recommendText||'').replace(/\n/g,'<br>')}</td></tr>
  </table>${buildWordPhotos(sec)}`;
}

function buildWordConclusions(sec, def) {
  return `<table>
    <tr class="sec-hdr"><td><strong>${escRaw(def.title)}</strong><br><span style="font-size:8pt;font-weight:normal">${escRaw(def.titleEn)}</span></td></tr>
    ${sec.conclusionText?`<tr><td style="white-space:pre-wrap">${escRaw(sec.conclusionText).replace(/\n/g,'<br>')}</td></tr>`:''}
    ${sec.notes?`<tr><td class="lbl">Allegati / Annexes</td></tr><tr><td style="white-space:pre-wrap">${escRaw(sec.notes).replace(/\n/g,'<br>')}</td></tr>`:''}
  </table>`;
}

function buildWordPhotos(sec) {
  if (!sec.photos || !sec.photos.length) return '';
  const cols = 2;
  let html = '<table>';
  for (let i = 0; i < sec.photos.length; i += cols) {
    html += '<tr>';
    for (let j = 0; j < cols; j++) {
      const p = sec.photos[i + j];
      if (p) {
        html += `<td class="photo-cell"><img src="${p.dataUrl}"><div class="photo-caption">${escRaw(p.caption||'')}</div></td>`;
      } else {
        html += '<td class="photo-cell"></td>';
      }
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const saved = await loadState();
  if (saved) {
    state = saved;
    // Migrate: add any missing sections
    SECTIONS.forEach(def => {
      if (!state.sections.find(s=>s.id===def.id)) {
        state.sections.push({
          id:def.id, enabled:true,
          rows:def.rows.map(r=>({label:r,value:''})),
          tests:def.tests.map(t=>({name:t,outcome:''})),
          photos:[], notes:'', outcome:'',
          docs:def.defaultDocs?def.defaultDocs.map(d=>({doc:d,issuedBy:'',issueDate:'',expiry:''})):undefined,
          seaRuns:def.type==='sea_trial'?defaultSeaRuns():undefined,
          recommendText:'', conclusionText:''
        });
      }
    });
  } else {
    state = defaultState();
  }
  buildNav();
  renderSection();
}

// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

init();
</script>
